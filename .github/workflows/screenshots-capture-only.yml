name: Screenshots capture-only (no ASC, sign-off path)

# Doctrine: feedback_screenshot_seed_release_gate.md + feedback_validate_one_png_before_long_watcher.md
# Captures the full device-class set and uploads the PNGs as an artifact for Tek sign-off.
# Does NOT touch ASC. Run resubmit_version_screenshots (separate workflow / manual fastlane)
# AFTER sign-off to deliver the approved set.

on:
  workflow_dispatch:

concurrency:
  group: screenshots-capture-${{ github.ref }}
  cancel-in-progress: true

jobs:
  capture:
    name: Capture all device classes (no deliver)
    runs-on: [ self-hosted, macOS, ios-build, ARM64 ]
    timeout-minutes: 60

    env:
      APP_NAME: wraith
      BUNDLE_ID: com.katafract.wraith
      SCHEME: WraithVPN
      RBENV_RUBY: /Users/christianflores/.rbenv/versions/3.3.11

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Load runner env
        run: |
          ENV_FILE="$HOME/runner-env/${APP_NAME}.env"
          if [ -f "$ENV_FILE" ]; then
            grep -v '^#' "$ENV_FILE" | grep '=' >> "$GITHUB_ENV"
          fi

      - name: Unlock keychain
        run: |
          if [ -n "$KEYCHAIN" ]; then
            security unlock-keychain -p "" "$KEYCHAIN" || true
          fi

      - name: Regenerate Xcode project (if xcodegen)
        run: |
          if [ -f "project.yml" ] && command -v xcodegen >/dev/null 2>&1; then
            xcodegen generate 2>&1 | tail -20
          fi

      - name: Install Ruby deps (Ruby 3.3.11 via rbenv)
        run: |
          export PATH="${RBENV_RUBY}/bin:$PATH"
          ${RBENV_RUBY}/bin/bundle config set --local path 'vendor/bundle'
          ${RBENV_RUBY}/bin/bundle install --jobs 4 --retry 3 2>&1 | tail -10

      - name: Resolve SPM
        run: |
          xcodebuild -project ${SCHEME}.xcodeproj -scheme ${SCHEME} \
            -resolvePackageDependencies 2>&1 | tail -5 || true

      - name: Run capture-only lane (NO deliver)
        id: capture
        env:
          FASTLANE_HIDE_CHANGELOG: 1
          FASTLANE_SKIP_UPDATE_CHECK: 1
          FASTLANE_DISABLE_COLORS: 1
        run: |
          set -o pipefail
          export PATH="${RBENV_RUBY}/bin:$PATH"
          rm -rf fastlane/screenshots
          ${RBENV_RUBY}/bin/bundle exec fastlane capture_version_screenshots 2>&1 | tee /tmp/fastlane-capture.log | tail -120
          SHOTS=$(find fastlane/screenshots -name '*.png' 2>/dev/null | wc -l | tr -d ' ')
          echo "shot_count=${SHOTS}" >> "$GITHUB_OUTPUT"
          echo "capture produced ${SHOTS} PNG(s)"

      - name: Collect artifacts
        if: always()
        run: |
          rm -rf /tmp/screenshot-capture-art
          mkdir -p /tmp/screenshot-capture-art
          cp -r fastlane/screenshots /tmp/screenshot-capture-art/ 2>/dev/null || true
          tail -200 /tmp/fastlane-capture.log > /tmp/screenshot-capture-art/fastlane.tail.log 2>/dev/null || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-capture-${{ github.run_number }}
          path: /tmp/screenshot-capture-art/
          retention-days: 14

      - name: Hard fail if <6 PNGs
        if: always()
        run: |
          SHOTS="${{ steps.capture.outputs.shot_count }}"
          if [ "${SHOTS:-0}" -lt 6 ]; then
            echo "::error::Capture produced ${SHOTS:-0} PNGs (<6) — inspect artifact."
            exit 1
          fi
          echo "Capture OK — ${SHOTS} PNG(s) ready for sign-off."
